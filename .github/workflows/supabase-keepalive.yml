name: Supabase Keepalive

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_PING_PATH: ${{ secrets.SUPABASE_PING_PATH }}

    steps:
      - name: Ping Supabase health endpoint
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

          ping_path="${SUPABASE_PING_PATH:-/auth/v1/health}"
          if [[ "${ping_path}" != /* ]]; then
            ping_path="/${ping_path}"
          fi

          ping_url="${SUPABASE_URL%/}${ping_path}"
          response_file="$(mktemp)"

          http_status="$(curl --show-error --silent \
            --connect-timeout 15 \
            --max-time 30 \
            --header "apikey: ${SUPABASE_ANON_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${ping_url}" \
            --output "${response_file}" \
            --write-out "%{http_code}")"

          echo "Supabase responded with HTTP ${http_status}."

          if [ "${http_status}" -lt 200 ] || [ "${http_status}" -ge 400 ]; then
            echo "Response body:"
            cat "${response_file}"
            exit 1
          fi

          echo "Supabase ping succeeded."
